<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FactTracer QA Comparison</title>
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Noto Sans KR", sans-serif;
        color: #0f172a;
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #ffffff;
      }

      header {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        border-bottom: 1px solid #dbe3ee;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      header span {
        color: #64748b;
        font-size: 13px;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 64px);
      }

      section {
        min-width: 0;
        padding: 18px;
      }

      section + section {
        border-left: 1px solid #dbe3ee;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 14px;
        color: #334155;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #dbe3ee;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>FactTracer QA Comparison</h1>
      <span>Source visual vs rendered prototype, desktop state</span>
    </header>
    <main>
      <section>
        <h2>Source Visual: Issue Stream</h2>
        <img src="./source-issue-stream.png" alt="Source issue stream design" />
      </section>
      <section>
        <h2>Implementation: Home Stream</h2>
        <img src="./home-final-1440.jpg" alt="Rendered home stream implementation" />
      </section>
    </main>
  </body>
</html>
