name: facttracer-backend-ci

on:
  push:
    paths:
      - "facttracer-backend/**"
  pull_request:
    paths:
      - "facttracer-backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: facttracer-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python scripts/audit_api_spec.py
